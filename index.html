<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Algérie Background</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .frame {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }
  </style>
</head>
<body>
  <div class="frame">
    <img src="https://res.cloudinary.com/dcht5c6jc/image/upload/v1772809685/Screenshot_2026-03-06_154923_cu8okp.png" alt="Air Algérie" />
  </div>
</body>
</html>
